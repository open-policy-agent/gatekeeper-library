apiVersion: v1
kind: Pod
metadata:
  name: init-gpu-exceeds-limit
spec:
  initContainers:
    - name: setup
      image: nvidia/cuda:12.0-runtime
      resources:
        limits:
          nvidia.com/gpu: "8"
  containers:
    - name: app
      image: nginx:1.25
      resources:
        limits:
          cpu: "500m"