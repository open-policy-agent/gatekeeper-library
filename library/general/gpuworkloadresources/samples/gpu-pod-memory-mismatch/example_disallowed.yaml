apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod-memory-mismatch
spec:
  containers:
    - name: training
      image: nvidia/cuda:12.0-runtime
      resources:
        requests:
          nvidia.com/gpu: "1"
          memory: "8Gi"
          cpu: "2"
        limits:
          nvidia.com/gpu: "1"
          memory: "16Gi"
          cpu: "4"