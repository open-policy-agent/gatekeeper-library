apiVersion: v1
kind: Pod
metadata:
  name: ai-model-compliant
  labels:
    workload-type: ai-model
  annotations:
    ai-controls/audit-logging: "enabled"
spec:
  containers:
    - name: model-server
      image: model-registry.example.com/llama3:v2.1@sha256:abc123def456
      env:
        - name: MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: model-credentials
              key: api-key
      resources:
        limits:
          cpu: "2"
          memory: "8Gi"
