apiVersion: v1
kind: Pod
metadata:
  name: ai-model-plain-cred
  labels:
    workload-type: ai-model
  annotations:
    ai-controls/audit-logging: "enabled"
spec:
  containers:
    - name: model-server
      image: model-registry.example.com/llama3:v2.1
      env:
        - name: OPENAI_API_KEY
          value: "sk-plaintextcredential1234"
      resources:
        limits:
          cpu: "2"
          memory: "8Gi"
