apiVersion: v1
kind: Pod
metadata:
  name: gpu-init-without-env-var
spec:
  initContainers:
    - name: setup
      image: nvidia/cuda:12.0-runtime
      resources:
        limits:
          nvidia.com/gpu: "1"
  containers:
    - name: app
      image: nginx:1.25
      resources:
        limits:
          cpu: "500m"