apiVersion: v1
kind: Pod
metadata:
  name: gpu-ephemeral-without-env-var
spec:
  containers:
    - name: app
      image: nginx:1.25
      resources:
        limits:
          cpu: "500m"
  ephemeralContainers:
    - name: debug-gpu
      image: nvidia/cuda:12.0-runtime
      resources:
        limits:
          nvidia.com/gpu: "1"