apiVersion: v1
kind: Pod
metadata:
  name: gpu-shm-non-memory
spec:
  volumes:
    - name: dshm
      emptyDir: {}
  containers:
    - name: training
      image: nvidia/cuda:12.0-runtime
      resources:
        limits:
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm