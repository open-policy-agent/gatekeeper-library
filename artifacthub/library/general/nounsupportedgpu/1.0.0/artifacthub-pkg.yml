description: Containers which request NVIDIA GPU resources (nvidia.com/gpu) must set the NVIDIA_VISIBLE_DEVICES environment variable, indicating the container image is built to consume GPUs via the NVIDIA CUDA runtime. This prevents GPU resource waste from containers that request GPUs but cannot use them.
