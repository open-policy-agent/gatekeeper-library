apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredgputoleration
  annotations:
    metadata.gatekeeper.sh/title: "Required GPU Toleration"
    metadata.gatekeeper.sh/version: 1.0.0
    metadata.gatekeeper.sh/bundle: "gatekeeper-gpu-safety-policies, gatekeeper-ai-training-policies, gatekeeper-ai-inference-policies"
    description: >-
      Requires pods that request NVIDIA GPU resources (nvidia.com/gpu) to include
      a toleration for the specified GPU node taint. This ensures GPU workloads
      are properly configured to schedule on GPU nodes.
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredGpuToleration
      validation:
        openAPIV3Schema:
          type: object
          description: >-
            Requires pods requesting GPUs to include a specified toleration.
          properties:
            tolerationKey:
              description: >-
                The taint key that GPU pods must tolerate (e.g., "nvidia.com/gpu").
              type: string
            exemptImages:
              description: >-
                Any container that uses an image that matches an entry in this list will be excluded
                from enforcement. Prefix-matching can be signified with `*`.
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
      - engine: K8sNativeValidation
        source:
          variables:
          - name: containers
            expression: 'has(variables.anyObject.spec.containers) ? variables.anyObject.spec.containers : []'
          - name: initContainers
            expression: 'has(variables.anyObject.spec.initContainers) ? variables.anyObject.spec.initContainers : []'
          - name: ephemeralContainers
            expression: 'has(variables.anyObject.spec.ephemeralContainers) ? variables.anyObject.spec.ephemeralContainers : []'
          - name: exemptImagePrefixes
            expression: |
              !has(variables.params.exemptImages) ? [] :
                variables.params.exemptImages.filter(image, image.endsWith("*")).map(image, string(image).replace("*", ""))
          - name: exemptImageExplicit
            expression: |
              !has(variables.params.exemptImages) ? [] :
                variables.params.exemptImages.filter(image, !image.endsWith("*"))
          - name: exemptImages
            expression: |
              (variables.containers + variables.initContainers + variables.ephemeralContainers).filter(container,
                container.image in variables.exemptImageExplicit ||
                variables.exemptImagePrefixes.exists(exemption, string(container.image).startsWith(exemption))
              ).map(container, container.image)
          - name: podRequestsGpu
            expression: |
              (variables.containers + variables.initContainers + variables.ephemeralContainers).exists(container,
                !(container.image in variables.exemptImages) &&
                has(container.resources) &&
                has(container.resources.limits) &&
                "nvidia.com/gpu" in container.resources.limits &&
                quantity(string(container.resources.limits["nvidia.com/gpu"])).compareTo(quantity("0")) > 0
              )
          - name: tolerationKey
            expression: 'has(variables.params.tolerationKey) ? variables.params.tolerationKey : ""'
          - name: hasToleration
            expression: |
              !has(variables.anyObject.spec.tolerations) ? false :
                variables.anyObject.spec.tolerations.exists(t, t.key == variables.tolerationKey)
          validations:
          - expression: '!variables.podRequestsGpu || variables.tolerationKey == "" || variables.hasToleration'
            messageExpression: '"Pod <" + variables.anyObject.metadata.name + "> requests GPU resources but does not tolerate taint key <" + variables.tolerationKey + ">"'
      - engine: Rego
        source:
          rego: |
            package k8srequiredgputoleration

            violation[{"msg": msg}] {
                pod_requests_gpu
                toleration_key := object.get(input, ["parameters", "tolerationKey"], "")
                toleration_key != ""
                not has_toleration(toleration_key)
                msg := sprintf("Pod <%v> requests GPU resources but does not tolerate taint key <%v>", [input.review.object.metadata.name, toleration_key])
            }

            pod_requests_gpu {
                container := input_containers[_]
                not is_exempt(container)
                gpu := container.resources.limits["nvidia.com/gpu"]
                to_number(gpu) > 0
            }

            has_toleration(key) {
                toleration := input.review.object.spec.tolerations[_]
                toleration.key == key
            }

            input_containers[c] {
                c := input.review.object.spec.containers[_]
            }

            input_containers[c] {
                c := input.review.object.spec.initContainers[_]
            }

            input_containers[c] {
                c := input.review.object.spec.ephemeralContainers[_]
            }

            is_exempt(container) {
                exempt_images := object.get(input, ["parameters", "exemptImages"], [])
                img := container.image
                exemption := exempt_images[_]
                _matches_exemption(img, exemption)
            }

            _matches_exemption(img, exemption) {
                not endswith(exemption, "*")
                exemption == img
            }

            _matches_exemption(img, exemption) {
                endswith(exemption, "*")
                prefix := trim_suffix(exemption, "*")
                startswith(img, prefix)
            }
