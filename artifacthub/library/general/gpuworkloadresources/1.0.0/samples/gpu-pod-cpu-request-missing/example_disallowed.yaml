apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod-cpu-request-missing
spec:
  containers:
    - name: training
      image: nvidia/cuda:12.0-runtime
      resources:
        requests:
          nvidia.com/gpu: "1"
          memory: "16Gi"
          cpu: "2"
        limits:
          nvidia.com/gpu: "1"
          memory: "16Gi"
          cpu: "4"
    - name: logger
      image: busybox:1.36
      resources:
        requests:
          memory: "256Mi"
        limits:
          memory: "256Mi"
          cpu: "500m"