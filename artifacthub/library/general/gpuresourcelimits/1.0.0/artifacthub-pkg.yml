name: k8sgpuresourcelimits
displayName: GPU Resource Limits
createdAt: "2026-03-17T00:04:28Z"
description: Enforces a maximum number of NVIDIA GPUs (nvidia.com/gpu) that a single container may request. This prevents individual containers from hoarding GPU resources on shared clusters, particularly for AI/ML training workloads.
